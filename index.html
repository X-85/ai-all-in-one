<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 全栈知识库</title>
  <link rel="stylesheet" href="//unpkg.com/docsify/themes/vue.css">
  <style>
    :root {
      --theme-color: #42b983;
    }
    .sidebar-toggle {
      background-color: var(--theme-color);
    }
    .markdown-content h1 {
      border-bottom: 2px solid var(--theme-color);
      padding-bottom: 10px;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'AI 全栈知识库',
      repo: 'https://github.com/X-85/ai-all-in-one',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索',
        noData: '没有找到结果',
        depth: 3
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true
      }
    }
  </script>
  <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
  <script src="//unpkg.com/docsify/lib/plugins/search.min.js"></script>
  <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
